services:
  - type: web
    name: finsathi-ai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: FINSATHI_IBM_API_KEY
        sync: false
      - key: IBM_API_KEY
        sync: false
      - key: IBM_PROJECT_ID
        sync: false
      - key: IBM_URL
        value: https://us-south.ml.cloud.ibm.com
